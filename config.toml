log_level = "INFO"

[llm]
model = "gemma-4-31b-it"
system_prompt_path = "prompts/system.xml"

[bot]
source_code_url = "https://github.com/lexxieblack/songbird"

[links]
"twitter.com" = { swap = "fxtwitter.com", clean = true, chat = true }
"x.com" = { swap = "fxtwitter.com", clean = true, chat = true }
"instagram.com" = { swap = "kkinstagram.com", clean = true, chat = true }
"reddit.com" = { swap = "rxddit.com", clean = true, chat = true }
"tiktok.com" = { swap = "d.tiktokez.com", follow = true, clean = true, chat = true }
"youtube.com" = { clean = true, clean_exceptions = ["t", "v", "list"] }
"youtu.be" = { clean = true, clean_exceptions = ["t", "v", "list"] }
"facebook.com" = { swap = "facebed.com", clean = true }
"*" = { clean = true }
